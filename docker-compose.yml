services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: cinematch-postgres
    environment:
      POSTGRES_USER: cinematch
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cinematch_dev}
      POSTGRES_DB: cinematch
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cinematch"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cinematch-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-cinematch_dev}
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-cinematch_dev}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
